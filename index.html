<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Peblla-style Restaurant Growth Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f8;
    --surface: #ffffff;
    --surface2: #f9fafb;
    --border: #e6e8ee;
    --border2: #d7dbe5;
    --text: #181a20;
    --muted: #717788;
    --accent: #ff5a00;
    --accent-dim: rgba(255, 90, 0, 0.08);
    --accent-border: rgba(255, 90, 0, 0.3);
    --purple: #7d739b;
    --purple-dim: #f4f2fb;
    --amber: #98785e;
    --amber-dim: #f9f3ec;
    --ai-bubble: #ffffff;
    --user-bubble: #fff5ef;
    --font-display: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 10px;
    --radius-sm: 8px;
    --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.05);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: radial-gradient(circle at top left, #fff2eb 0%, #f5f6fa 42%, #f3f5f8 100%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  .page-shell {
    position: relative;
    z-index: 1;
    max-width: 1220px;
    margin: 24px auto;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #fcfcfd;
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }

  .top-nav {
    height: 62px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #fff 0%, #fafbfd 100%);
  }

  .nav-left, .nav-right {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
  }

  .logo-mark {
    width: 18px;
    height: 18px;
    border: 3px solid var(--accent);
    border-left-width: 7px;
    border-radius: 4px;
  }
  .logo-word {
    font-family: var(--font-display);
    font-size: 34px;
    line-height: 1;
    font-weight: 700;
    color: #12141a;
    letter-spacing: -0.04em;
    margin-right: 12px;
  }
  .crumbs { font-weight: 600; color: #303644; }
  .crumbs span { color: #a4a8b3; margin: 0 2px; }

  .page {
    padding: 24px 26px 40px;
  }

  .header {
    padding: 8px 0 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
    animation: fadeUp 0.6s ease both;
    gap: 16px;
  }
  .header-left { max-width: 620px; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.45;transform:scale(0.8);} }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(30px, 3.6vw, 38px);
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -0.03em;
  }
  h1 em { font-style: normal; color: var(--accent); }
  .header-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
  }
  .header-stat {
    text-align: right;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 12px 14px;
    min-width: 190px;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .chat {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.35s ease forwards;
  }
  .row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .avatar.ai {
    background: #fff5ee;
    border: 1px solid var(--accent-border);
    color: var(--accent);
    font-size: 14px;
  }
  .avatar.user {
    background: #f0f2f7;
    border: 1px solid var(--border2);
    color: #4f5564;
  }

  .bubble {
    max-width: min(980px, calc(100% - 44px));
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.55;
    border-radius: 10px;
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border2);
    color: var(--text);
  }
  .bubble.ai.interactive {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .bubble.ai.interactive > p {
    font-weight: 600;
    color: #2a2e39;
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--accent-border);
    color: #7a2e00;
    font-weight: 600;
    max-width: 60%;
  }

  .opts { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt {
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: #4d5363;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .opt:hover { border-color: var(--accent-border); color: var(--accent); background: #fff5ef; }
  .opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .opt:disabled { opacity: 0.55; cursor: default; }

  .inp-row { display: flex; gap: 8px; }
  .inp-row input {
    flex: 1;
    background: #fff;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .inp-row input:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-dim); }
  .inp-row input::placeholder { color: #9ba1b1; }
  .inp-row button, .cta-btn {
    padding: 10px 16px;
    background: linear-gradient(180deg, #ff6b20 0%, #ff5a00 100%);
    border: none;
    border-radius: 8px;
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 8px 18px rgba(255, 90, 0, 0.18);
  }
  .inp-row button:hover, .cta-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .inp-row button:active, .cta-btn:active { transform: translateY(0); }
  .inp-row button:disabled { opacity: 0.45; cursor: default; box-shadow: none; }

  .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a3a3aa;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-4px);} }

  @media (max-width: 930px) {
    .nav-right { display: none; }
    .bubble.ai.interactive { grid-template-columns: 1fr; row-gap: 10px; }
    .bubble.user { max-width: 75%; }
  }

  @media (max-width: 640px) {
    .page-shell { margin: 10px; border-radius: 12px; }
    .top-nav { padding: 0 14px; }
    .crumbs { display: none; }
    .logo-word { font-size: 30px; }
    .page { padding: 16px; }
    .header { flex-direction: column; align-items: flex-start; }
    .header-stat { width: 100%; text-align: left; }
    .bubble { max-width: calc(100% - 44px); }
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 22px 0 18px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .divider-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── RESULTS ── */
  #results { display: none; flex-direction: column; gap: 26px; }

  .section-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .section-title em { font-style: italic; color: var(--accent); }

  /* Promo cards */
  .promo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .promo-card {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 18px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .promo-card:hover { border-color: var(--accent-border); transform: translateY(-1px); }
  .promo-card:nth-child(1) { animation-delay: 0.05s; }
  .promo-card:nth-child(2) { animation-delay: 0.12s; }
  .promo-card:nth-child(3) { animation-delay: 0.19s; }

  .ptag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .ptag.green { background: #f5f5f6; color: #62626b; border: 1px solid #e5e5e7; }
  .ptag.purple { background: var(--purple-dim); color: var(--purple); border: 1px solid #e5e5e7; }
  .ptag.amber { background: var(--amber-dim); color: var(--amber); border: 1px solid #e5e5e7; }

  .promo-card h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .promo-card p { font-size: 13px; color: var(--muted); line-height: 1.55; }
  .promo-num {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--accent);
    margin-top: 14px;
    line-height: 1;
  }
  .promo-num-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Impact metrics */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (min-width: 560px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } }

  .metric {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 18px 16px;
    animation: fadeUp 0.5s ease both;
  }
  .metric:nth-child(1){animation-delay:0.05s;} .metric:nth-child(2){animation-delay:0.1s;}
  .metric:nth-child(3){animation-delay:0.15s;} .metric:nth-child(4){animation-delay:0.2s;}

  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .metric-value {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .metric-change {
    font-size: 12px;
    color: var(--accent);
    margin-top: 5px;
    font-weight: 500;
  }

  /* Bar chart */
  .bar-card {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-name { font-size: 13px; color: var(--muted); min-width: 120px; }
  .bar-track { flex: 1; height: 8px; background: #ededee; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0; }
  .bar-pct { font-size: 13px; font-weight: 500; color: var(--text); min-width: 36px; text-align: right; }

  /* CTA */
  .cta-card {
    background: #fff8f4;
    border: 1px solid var(--accent-border);
    border-radius: var(--radius);
    padding: 24px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .cta-text h3 { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .cta-text p { font-size: 13px; color: var(--muted); }
  .cta-btn {
    white-space: nowrap;
    font-size: 14px;
    padding-inline: 20px;
  }

  .disclaimer {
    font-size: 12px;
    color: #6b7da1;
    text-align: center;
    margin-top: -20px;
    font-style: italic;
    opacity: 0.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="page-shell">
  <div class="top-nav">
    <div class="nav-left">
      <div class="logo-mark"></div><div class="logo-word">peblla</div>
      <div class="crumbs">AI Marketing Specialist</div>
    </div>
    <div class="nav-right">
      <span>Columbia University · Student Project · Test Version</span>
    </div>
  </div>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="badge"><span class="badge-dot"></span> Peblla-style AI advisor</div>
      <h1>Grow your<br><em>restaurant</em></h1>
      <p class="header-sub">Answer 3 questions. Get a personalized promotion strategy in seconds.</p>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- RESULTS -->
  <div id="divider" class="divider" style="display:none;">
    <div class="divider-line"></div>
    <div class="divider-label">Your growth plan</div>
    <div class="divider-line"></div>
  </div>

  <div id="results"></div>

</div>
</div>

<script>
const chat = document.getElementById('chat');
const state = { step: 0, type: '', goal: '', aov: '' };

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function addRow(role, content, animDelay) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  row.style.animationDelay = (animDelay || 0) + 'ms';

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? '✦' : 'You';

  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  if (typeof content === 'string') bub.innerHTML = content;
  else {
    bub.appendChild(content);
    bub.classList.add('interactive');
  }

  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  return bub;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'row ai';
  row.id = 'typing-row';
  row.style.opacity = '1';
  const av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = '✦';
  const bub = document.createElement('div');
  bub.className = 'bubble ai';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

const questions = [
  { text: 'What type of restaurant do you run?', opts: ['Fine dining', 'Casual dining', 'Fast casual', 'Cafe / bakery', 'Bar & grill', 'Food truck'] },
  { text: 'What is your primary business goal?', opts: ['Increase foot traffic', 'Increase weekly profit', 'Increase revenue per visit'] },
  { text: 'What is your average order value?', input: true, placeholder: 'e.g. $28' }
];

function ask(qIndex, d) {
  addTyping();
  setTimeout(() => {
    removeTyping();
    const q = questions[qIndex];
    const frag = document.createDocumentFragment();
    const p = document.createElement('p');
    p.textContent = q.text;
    frag.appendChild(p);

    if (q.opts) {
      const opts = document.createElement('div');
      opts.className = 'opts';
      q.opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = o;
        btn.onclick = () => {
          opts.querySelectorAll('.opt').forEach(b => { b.disabled = true; b.classList.remove('selected'); });
          btn.classList.add('selected');
          if (qIndex === 0) state.type = o;
          else state.goal = o;
          state.step++;
          setTimeout(() => addRow('user', escapeHTML(o), 0), 250);
          setTimeout(() => {
            if (state.step < 3) ask(state.step, 0);
          }, 900);
        };
        opts.appendChild(btn);
      });
      frag.appendChild(opts);
    } else {
      const inRow = document.createElement('div');
      inRow.className = 'inp-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = q.placeholder;
      const sbtn = document.createElement('button');
      sbtn.textContent = 'Submit →';
      const submit = () => {
        const v = inp.value.trim();
        if (!v) return;
        inp.disabled = true;
        sbtn.disabled = true;
        state.aov = v;
        state.step++;
        setTimeout(() => addRow('user', escapeHTML(v), 0), 250);
        setTimeout(() => showResults(), 1100);
      };
      sbtn.onclick = submit;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
      inRow.appendChild(inp);
      inRow.appendChild(sbtn);
      frag.appendChild(inRow);
    }

    addRow('ai', frag, 0);
  }, d || 700);
}

function localFallbackPlan() {
  const aov = parseFloat(state.aov.replace(/[^0-9.]/g, '')) || 30;
  const projectedAov = Math.round(aov * 1.18);
  const visits = Math.round(38 + Math.random() * 18);
  const revenue = Math.round((projectedAov * visits * 4.2) / 100) * 100;
  const isFoot = state.goal.toLowerCase().includes('foot') || state.goal.toLowerCase().includes('traffic');
  const isOrder = state.goal.toLowerCase().includes('order');

  return {
    introSummary: `Based on your ${state.type.toLowerCase()} format, goal to ${state.goal.toLowerCase()}, and current average order value of ${state.aov}, here is a practical promotion plan you can test over the next 30 days.`,
    promotions: [
      isFoot
        ? { tag: 'Happy Hour', tagColor: 'green', title: 'Weekday Traffic Booster', desc: `Run a timed offer during slower hours with about $${Math.round(aov * 0.15)} off orders over $${Math.round(aov * 0.8)} to increase seat utilization.`, value: `+${visits}`, valueLabel: 'extra visits / week' }
        : { tag: 'Loyalty', tagColor: 'green', title: 'Simple Repeat-Visit Program', desc: 'Offer a punch-card or loyalty reward after a set number of visits to increase retention among regulars.', value: '8×', valueLabel: 'repeat trigger cycle' },
      isOrder
        ? { tag: 'Bundle', tagColor: 'purple', title: 'Checkout Add-On Bundle', desc: `Pair a high-margin drink or dessert with core items to lift basket size without adding friction.`, value: '+15%', valueLabel: 'ticket size lift' }
        : { tag: 'Upsell', tagColor: 'purple', title: 'Premium Upgrade Prompt', desc: 'Train staff or the menu flow to suggest one premium add-on for each order.', value: `+$${Math.round(aov * 0.12)}`, valueLabel: 'per order opportunity' },
      { tag: 'Social', tagColor: 'amber', title: 'Instagram Check-In Offer', desc: `Give customers a low-cost freebie when they tag your ${state.type.toLowerCase()} on social media to create organic reach.`, value: '3.2×', valueLabel: 'organic reach ROI' }
    ],
    metrics: {
      avgOrderValue: `$${projectedAov}`,
      avgOrderValueChange: '↑ +18% vs current',
      extraVisitsPerWeek: String(visits),
      extraVisitsPerWeekChange: '↑ estimated uplift',
      monthlyRevenueLift: `$${revenue.toLocaleString()}`,
      monthlyRevenueLiftChange: '↑ if executed consistently',
      promoROI: '4.2×',
      promoROIChange: '↑ estimated return'
    },
    channelImpact: [
      { name: 'Loyalty / repeat', pct: 78, color: '#5de8c4' },
      { name: 'Social media', pct: 62, color: '#b8a4f8' },
      { name: 'In-store upsell', pct: 54, color: '#f5c26b' },
      { name: 'Timed promotions', pct: 40, color: '#c8f56a' }
    ],
    cta: {
      title: 'Ready to test these promotions?',
      subtitle: 'Start with one offer this week, then compare visits, AOV, and repeat rate.',
      button: 'Launch my plan →'
    },
    disclaimer: `Estimated impact is illustrative and should be validated using your real store data.`
  };
}

async function getPlanFromAPI() {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      restaurantType: state.type,
      businessGoal: state.goal,
      averageOrderValue: state.aov
    })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || 'Request failed');
  }

  return res.json();
}

function renderResults(plan) {
  const divider = document.getElementById('divider');
  divider.style.display = 'flex';
  divider.style.animationDelay = '0ms';
  divider.style.opacity = '1';

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'flex';
  resultsEl.style.flexDirection = 'column';
  resultsEl.style.gap = '26px';

  const promosHtml = (plan.promotions || []).map((p, idx) => `
    <div class="promo-card" style="animation-delay:${0.05 + idx * 0.07}s;">
      <span class="ptag ${escapeHTML(p.tagColor || 'green')}">${escapeHTML(p.tag || 'Promo')}</span>
      <h3>${escapeHTML(p.title || '')}</h3>
      <p>${escapeHTML(p.desc || '')}</p>
      <div class="promo-num">${escapeHTML(p.value || '')}</div>
      <div class="promo-num-label">${escapeHTML(p.valueLabel || '')}</div>
    </div>
  `).join('');

  const channelHtml = (plan.channelImpact || []).map(item => `
    <div class="bar-row">
      <span class="bar-name">${escapeHTML(item.name || '')}</span>
      <div class="bar-track"><div class="bar-fill" data-w="${Number(item.pct) || 0}" style="background:${item.color || '#c8f56a'};"></div></div>
      <span class="bar-pct">${Number(item.pct) || 0}%</span>
    </div>
  `).join('');

  resultsEl.innerHTML = `
    <div>
      <div class="section-title">Your <em>3 promotions</em></div>
      <div class="promo-grid">${promosHtml}</div>
    </div>

    <div>
      <div class="section-title"><em>Predicted impact</em> — 30 days</div>
      <div class="metrics-grid">
        <div class="metric">
          <div class="metric-label">Avg order value</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.avgOrderValue || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.avgOrderValueChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Extra visits/week</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.extraVisitsPerWeek || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.extraVisitsPerWeekChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Monthly rev. lift</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.monthlyRevenueLift || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.monthlyRevenueLiftChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Promo ROI</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.promoROI || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.promoROIChange || '')}</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Uplift <em>by channel</em></div>
      <div class="bar-card">${channelHtml}</div>
    </div>

    <div class="cta-card">
      <div class="cta-text">
        <h3>${escapeHTML(plan.cta?.title || 'Ready to launch?')}</h3>
        <p>${escapeHTML(plan.cta?.subtitle || '')}</p>
      </div>
      <button class="cta-btn" onclick="alert('Next step: connect your POS or analytics stack.')">${escapeHTML(plan.cta?.button || 'Start →')}</button>
    </div>

    <p class="disclaimer">* ${escapeHTML(plan.disclaimer || 'Estimates may vary by location, menu, and execution quality.')}</p>
  `;

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

async function showResults() {
  addTyping();

  try {
    const plan = await getPlanFromAPI();
    removeTyping();
    addRow('ai', `Perfect. I used your answers to generate a tailored strategy for a <strong>${escapeHTML(state.type)}</strong> focused on <strong>${escapeHTML(state.goal.toLowerCase())}</strong> with an AOV of <strong>${escapeHTML(state.aov)}</strong>.`, 0);
    setTimeout(() => renderResults(plan), 700);
  } catch (error) {
    removeTyping();
    addRow('ai', 'I could not reach the live AI model, so I generated a fallback strategy locally. Once your DeepSeek API key is connected in Vercel, this section will become fully dynamic.', 0);
    setTimeout(() => renderResults(localFallbackPlan()), 700);
    console.error(error);
  }
}

setTimeout(() => {
  addRow('ai', 'Hi! I\'m your restaurant growth advisor. I\'ll help you find the right promotions to hit your goals.', 0);
  setTimeout(() => ask(0, 0), 900);
}, 400);
</script>
