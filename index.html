<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Peblla-style Restaurant Growth Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f8ff;
    --surface: #ffffff;
    --surface2: #eef4ff;
    --border: rgba(21, 67, 151, 0.12);
    --border2: rgba(21, 67, 151, 0.2);
    --text: #0f274d;
    --muted: #5a6f95;
    --accent: #2f80ff;
    --accent-2: #00b7ff;
    --accent-dim: rgba(47, 128, 255, 0.1);
    --accent-border: rgba(47, 128, 255, 0.35);
    --purple: #6a7dff;
    --purple-dim: rgba(106, 125, 255, 0.12);
    --teal: #00a7c6;
    --teal-dim: rgba(0, 167, 198, 0.12);
    --amber: #ff8a3d;
    --amber-dim: rgba(255, 138, 61, 0.14);
    --ai-bubble: #ffffff;
    --user-bubble: linear-gradient(135deg, rgba(47, 128, 255, 0.12), rgba(0, 183, 255, 0.09));
    --font-display: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-soft: 0 10px 35px rgba(40, 76, 151, 0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 8% 4%, rgba(47, 128, 255, 0.2), transparent 35%),
      radial-gradient(circle at 92% 10%, rgba(0, 183, 255, 0.16), transparent 30%),
      linear-gradient(180deg, #f8fbff 0%, #f3f7ff 38%, #f5f8ff 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 22px auto;
    padding: 0 24px 80px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(47, 128, 255, 0.16);
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(32, 73, 153, 0.12);
    backdrop-filter: blur(6px);
  }

  /* ── HEADER ── */
  .header {
    padding: 52px 0 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }
  .header-left { max-width: 520px; }
  .badge {
    box-shadow: 0 4px 12px rgba(47, 128, 255, 0.14);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 0.5px solid var(--accent-border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.85);} }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 46px);
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  h1 em { font-style: normal; color: var(--accent); }
  .header-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 300;
  }
  .header-stat {
    text-align: right;
    display: none;
  }
  @media (min-width: 580px) { .header-stat { display: block; } }
  .stat-num {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── CHAT AREA ── */
  .chat {
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
  }
  .row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .avatar.ai {
    background: linear-gradient(145deg, #ffffff, #edf3ff);
    border: 1px solid var(--border2);
    color: var(--accent);
    font-size: 15px;
    box-shadow: 0 4px 12px rgba(47, 128, 255, 0.12);
  }
  .avatar.user {
    background: #eaf2ff;
    border: 1px solid var(--accent-border);
    color: var(--accent);
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.65;
    border-radius: var(--radius);
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--accent-border);
    color: #1353b6;
    font-weight: 600;
    border-radius: var(--radius) 6px var(--radius) var(--radius);
  }

  /* Options */
  .opts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .opt {
    padding: 7px 16px;
    border-radius: 22px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.2s;
  }
  .opt:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }
  .opt.selected { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }
  .opt:disabled { opacity: 0.5; cursor: default; }

  /* Text input */
  .inp-row { display: flex; gap: 8px; margin-top: 12px; }
  .inp-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .inp-row input:focus { border-color: var(--accent-border); }
  .inp-row input::placeholder { color: var(--muted); }
  .inp-row button {
    padding: 9px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none;
    border-radius: var(--radius-sm);
    color: #ffffff;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .inp-row button:hover { opacity: 0.88; }
  .inp-row button:active { transform: scale(0.97); }
  .inp-row button:disabled { opacity: 0.4; cursor: default; }

  /* Typing indicator */
  .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 40px 0 32px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .divider-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── RESULTS ── */
  #results { display: none; flex-direction: column; gap: 40px; }

  .section-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .section-title em { font-style: italic; color: var(--accent); }

  /* Promo cards */
  .promo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .promo-card {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .promo-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .promo-card:nth-child(1) { animation-delay: 0.05s; }
  .promo-card:nth-child(2) { animation-delay: 0.12s; }
  .promo-card:nth-child(3) { animation-delay: 0.19s; }

  .ptag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .ptag.green { background: rgba(93,232,196,0.1); color: var(--teal); border: 0.5px solid rgba(93,232,196,0.2); }
  .ptag.purple { background: var(--purple-dim); color: var(--purple); border: 0.5px solid rgba(184,164,248,0.2); }
  .ptag.amber { background: var(--amber-dim); color: var(--amber); border: 0.5px solid rgba(245,194,107,0.2); }

  .promo-card h3 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .promo-card p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .promo-num {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--accent);
    margin-top: 14px;
    line-height: 1;
  }
  .promo-num-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Impact metrics */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (min-width: 560px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } }

  .metric {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 18px 16px;
    animation: fadeUp 0.5s ease both;
  }
  .metric:nth-child(1){animation-delay:0.05s;} .metric:nth-child(2){animation-delay:0.1s;}
  .metric:nth-child(3){animation-delay:0.15s;} .metric:nth-child(4){animation-delay:0.2s;}

  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .metric-value {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .metric-change {
    font-size: 12px;
    color: var(--accent);
    margin-top: 5px;
    font-weight: 500;
  }

  /* Bar chart */
  .bar-card {
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-name { font-size: 13px; color: var(--muted); min-width: 120px; }
  .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0; }
  .bar-pct { font-size: 13px; font-weight: 500; color: var(--text); min-width: 36px; text-align: right; }

  /* CTA */
  .cta-card {
    background: linear-gradient(130deg, rgba(47, 128, 255, 0.12) 0%, rgba(0, 183, 255, 0.08) 100%);
    border: 0.5px solid var(--accent-border);
    border-radius: var(--radius);
    padding: 28px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .cta-text h3 { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--text); margin-bottom: 4px; }
  .cta-text p { font-size: 13px; color: var(--muted); }
  .cta-btn {
    padding: 11px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none;
    border-radius: var(--radius-sm);
    color: #ffffff;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
  }
  .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .disclaimer {
    font-size: 12px;
    color: #6b7da1;
    text-align: center;
    margin-top: -20px;
    font-style: italic;
    opacity: 0.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="badge"><span class="badge-dot"></span> Peblla-style AI advisor</div>
      <h1>Grow your<br><em>restaurant</em></h1>
      <p class="header-sub">Answer 3 questions. Get a personalized promotion strategy in seconds.</p>
    </div>
    <div class="header-stat">
      <div class="stat-num">3×</div>
      <div class="stat-label">avg revenue uplift<br>with active promos</div>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- RESULTS -->
  <div id="divider" class="divider" style="display:none;">
    <div class="divider-line"></div>
    <div class="divider-label">Your growth plan</div>
    <div class="divider-line"></div>
  </div>

  <div id="results"></div>

</div>


<script>
const chat = document.getElementById('chat');
const state = { step: 0, type: '', goal: '', aov: '' };

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function addRow(role, content, animDelay) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  row.style.animationDelay = (animDelay || 0) + 'ms';

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? '✦' : 'You';

  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  if (typeof content === 'string') bub.innerHTML = content;
  else bub.appendChild(content);

  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  return bub;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'row ai';
  row.id = 'typing-row';
  row.style.opacity = '1';
  const av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = '✦';
  const bub = document.createElement('div');
  bub.className = 'bubble ai';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

const questions = [
  { text: 'What type of restaurant do you run?', opts: ['Fine dining', 'Casual dining', 'Fast casual', 'Cafe / bakery', 'Bar & grill', 'Food truck'] },
  { text: 'What is your primary business goal?', opts: ['Increase foot traffic', 'Increase order volume', 'Increase revenue per visit'] },
  { text: 'What is your average order value?', input: true, placeholder: 'e.g. $28' }
];

function ask(qIndex, d) {
  addTyping();
  setTimeout(() => {
    removeTyping();
    const q = questions[qIndex];
    const frag = document.createDocumentFragment();
    const p = document.createElement('p');
    p.textContent = q.text;
    frag.appendChild(p);

    if (q.opts) {
      const opts = document.createElement('div');
      opts.className = 'opts';
      q.opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = o;
        btn.onclick = () => {
          opts.querySelectorAll('.opt').forEach(b => { b.disabled = true; b.classList.remove('selected'); });
          btn.classList.add('selected');
          if (qIndex === 0) state.type = o;
          else state.goal = o;
          state.step++;
          setTimeout(() => addRow('user', escapeHTML(o), 0), 250);
          setTimeout(() => {
            if (state.step < 3) ask(state.step, 0);
          }, 900);
        };
        opts.appendChild(btn);
      });
      frag.appendChild(opts);
    } else {
      const inRow = document.createElement('div');
      inRow.className = 'inp-row';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = q.placeholder;
      const sbtn = document.createElement('button');
      sbtn.textContent = 'Submit →';
      const submit = () => {
        const v = inp.value.trim();
        if (!v) return;
        inp.disabled = true;
        sbtn.disabled = true;
        state.aov = v;
        state.step++;
        setTimeout(() => addRow('user', escapeHTML(v), 0), 250);
        setTimeout(() => showResults(), 1100);
      };
      sbtn.onclick = submit;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
      inRow.appendChild(inp);
      inRow.appendChild(sbtn);
      frag.appendChild(inRow);
    }

    addRow('ai', frag, 0);
  }, d || 700);
}

function localFallbackPlan() {
  const aov = parseFloat(state.aov.replace(/[^0-9.]/g, '')) || 30;
  const projectedAov = Math.round(aov * 1.18);
  const visits = Math.round(38 + Math.random() * 18);
  const revenue = Math.round((projectedAov * visits * 4.2) / 100) * 100;
  const isFoot = state.goal.toLowerCase().includes('foot') || state.goal.toLowerCase().includes('traffic');
  const isOrder = state.goal.toLowerCase().includes('order');

  return {
    introSummary: `Based on your ${state.type.toLowerCase()} format, goal to ${state.goal.toLowerCase()}, and current average order value of ${state.aov}, here is a practical promotion plan you can test over the next 30 days.`,
    promotions: [
      isFoot
        ? { tag: 'Happy Hour', tagColor: 'green', title: 'Weekday Traffic Booster', desc: `Run a timed offer during slower hours with about $${Math.round(aov * 0.15)} off orders over $${Math.round(aov * 0.8)} to increase seat utilization.`, value: `+${visits}`, valueLabel: 'extra visits / week' }
        : { tag: 'Loyalty', tagColor: 'green', title: 'Simple Repeat-Visit Program', desc: 'Offer a punch-card or loyalty reward after a set number of visits to increase retention among regulars.', value: '8×', valueLabel: 'repeat trigger cycle' },
      isOrder
        ? { tag: 'Bundle', tagColor: 'purple', title: 'Checkout Add-On Bundle', desc: `Pair a high-margin drink or dessert with core items to lift basket size without adding friction.`, value: '+15%', valueLabel: 'ticket size lift' }
        : { tag: 'Upsell', tagColor: 'purple', title: 'Premium Upgrade Prompt', desc: 'Train staff or the menu flow to suggest one premium add-on for each order.', value: `+$${Math.round(aov * 0.12)}`, valueLabel: 'per order opportunity' },
      { tag: 'Social', tagColor: 'amber', title: 'Instagram Check-In Offer', desc: `Give customers a low-cost freebie when they tag your ${state.type.toLowerCase()} on social media to create organic reach.`, value: '3.2×', valueLabel: 'organic reach ROI' }
    ],
    metrics: {
      avgOrderValue: `$${projectedAov}`,
      avgOrderValueChange: '↑ +18% vs current',
      extraVisitsPerWeek: String(visits),
      extraVisitsPerWeekChange: '↑ estimated uplift',
      monthlyRevenueLift: `$${revenue.toLocaleString()}`,
      monthlyRevenueLiftChange: '↑ if executed consistently',
      promoROI: '4.2×',
      promoROIChange: '↑ estimated return'
    },
    channelImpact: [
      { name: 'Loyalty / repeat', pct: 78, color: '#5de8c4' },
      { name: 'Social media', pct: 62, color: '#b8a4f8' },
      { name: 'In-store upsell', pct: 54, color: '#f5c26b' },
      { name: 'Timed promotions', pct: 40, color: '#c8f56a' }
    ],
    cta: {
      title: 'Ready to test these promotions?',
      subtitle: 'Start with one offer this week, then compare visits, AOV, and repeat rate.',
      button: 'Launch my plan →'
    },
    disclaimer: `Estimated impact is illustrative and should be validated using your real store data.`
  };
}

async function getPlanFromAPI() {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      restaurantType: state.type,
      businessGoal: state.goal,
      averageOrderValue: state.aov
    })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || 'Request failed');
  }

  return res.json();
}

function renderResults(plan) {
  const divider = document.getElementById('divider');
  divider.style.display = 'flex';
  divider.style.animationDelay = '0ms';
  divider.style.opacity = '1';

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'flex';
  resultsEl.style.flexDirection = 'column';
  resultsEl.style.gap = '40px';

  const promosHtml = (plan.promotions || []).map((p, idx) => `
    <div class="promo-card" style="animation-delay:${0.05 + idx * 0.07}s;">
      <span class="ptag ${escapeHTML(p.tagColor || 'green')}">${escapeHTML(p.tag || 'Promo')}</span>
      <h3>${escapeHTML(p.title || '')}</h3>
      <p>${escapeHTML(p.desc || '')}</p>
      <div class="promo-num">${escapeHTML(p.value || '')}</div>
      <div class="promo-num-label">${escapeHTML(p.valueLabel || '')}</div>
    </div>
  `).join('');

  const channelHtml = (plan.channelImpact || []).map(item => `
    <div class="bar-row">
      <span class="bar-name">${escapeHTML(item.name || '')}</span>
      <div class="bar-track"><div class="bar-fill" data-w="${Number(item.pct) || 0}" style="background:${item.color || '#c8f56a'};"></div></div>
      <span class="bar-pct">${Number(item.pct) || 0}%</span>
    </div>
  `).join('');

  resultsEl.innerHTML = `
    <div>
      <div class="section-title">Your <em>3 promotions</em></div>
      <div class="promo-grid">${promosHtml}</div>
    </div>

    <div>
      <div class="section-title"><em>Predicted impact</em> — 30 days</div>
      <div class="metrics-grid">
        <div class="metric">
          <div class="metric-label">Avg order value</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.avgOrderValue || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.avgOrderValueChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Extra visits/week</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.extraVisitsPerWeek || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.extraVisitsPerWeekChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Monthly rev. lift</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.monthlyRevenueLift || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.monthlyRevenueLiftChange || '')}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Promo ROI</div>
          <div class="metric-value">${escapeHTML(plan.metrics?.promoROI || '-')}</div>
          <div class="metric-change">${escapeHTML(plan.metrics?.promoROIChange || '')}</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Uplift <em>by channel</em></div>
      <div class="bar-card">${channelHtml}</div>
    </div>

    <div class="cta-card">
      <div class="cta-text">
        <h3>${escapeHTML(plan.cta?.title || 'Ready to launch?')}</h3>
        <p>${escapeHTML(plan.cta?.subtitle || '')}</p>
      </div>
      <button class="cta-btn" onclick="alert('Next step: connect your POS or analytics stack.')">${escapeHTML(plan.cta?.button || 'Start →')}</button>
    </div>

    <p class="disclaimer">* ${escapeHTML(plan.disclaimer || 'Estimates may vary by location, menu, and execution quality.')}</p>
  `;

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

async function showResults() {
  addTyping();

  try {
    const plan = await getPlanFromAPI();
    removeTyping();
    addRow('ai', `Perfect. I used your answers to generate a tailored strategy for a <strong>${escapeHTML(state.type)}</strong> focused on <strong>${escapeHTML(state.goal.toLowerCase())}</strong> with an AOV of <strong>${escapeHTML(state.aov)}</strong>.`, 0);
    setTimeout(() => renderResults(plan), 700);
  } catch (error) {
    removeTyping();
    addRow('ai', 'I could not reach the live AI model, so I generated a fallback strategy locally. Once your DeepSeek API key is connected in Vercel, this section will become fully dynamic.', 0);
    setTimeout(() => renderResults(localFallbackPlan()), 700);
    console.error(error);
  }
}

setTimeout(() => {
  addRow('ai', 'Hi! I\'m your restaurant growth advisor. I\'ll help you find the right promotions to hit your goals.', 0);
  setTimeout(() => ask(0, 0), 900);
}, 400);
</script>
